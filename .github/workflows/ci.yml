name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # CI has no real DB — prisma generate only needs the schema file
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: TypeScript type-check
        run: npx tsc --noEmit
        env:
          # Stub secrets so type-checking passes without real values
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "ci-secret-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: "oTro626i44N2xlaTOyFZNym8A0laL0tScPLGD/saSyQ="

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "ci-secret-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: "oTro626i44N2xlaTOyFZNym8A0laL0tScPLGD/saSyQ="
