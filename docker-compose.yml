services:
  postgres:
    image: postgres:16-alpine
    container_name: cosbt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cosbt
      POSTGRES_PASSWORD: cosbt
      POSTGRES_DB: cosbt_camp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - cosbt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosbt -d cosbt_camp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cosbt_postgres_data:
